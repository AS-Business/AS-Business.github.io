<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AS-Creations Asset Store</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Tailwind Configuration -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        background: '#040d07', /* Deep dark green almost black */
                        card: '#0a1f12',       /* Dark green for cards */
                        accent: '#2ecc71',     /* Clean, bright neon green */
                        accentHover: '#27ae60',
                        borderGreen: '#1b4026' /* Subtle border color */
                    }
                }
            }
        }
    </script>

    <style>
        /* Minimalist Dot Grid Pattern Background */
        body { 
            background-color: #040d07; 
            background-image: radial-gradient(rgba(46, 204, 113, 0.15) 1px, transparent 1px);
            background-size: 30px 30px;
            color: #E2E8F0; 
        }
        
        /* Clean UI Cards - No heavy shadows */
        .clean-card {
            background-color: #0a1f12;
            border: 1px solid #1b4026;
            border-radius: 0.75rem;
        }

        .clean-button {
            border: 1px solid #1b4026;
            transition: all 0.2s ease-in-out;
        }
        
        .clean-button:hover {
            border-color: #2ecc71;
            background-color: rgba(46, 204, 113, 0.05);
        }

        /* Ribbon for Coming Soon */
        .ribbon-wrapper {
            position: absolute;
            top: 0;
            right: 0;
            width: 150px;
            height: 150px;
            overflow: hidden;
            border-top-right-radius: 0.75rem;
        }
        .ribbon {
            position: absolute;
            top: 30px;
            right: -35px;
            width: 200px;
            background-color: #1b4026;
            color: #2ecc71;
            text-align: center;
            padding: 5px 0;
            font-size: 0.75rem;
            font-weight: bold;
            transform: rotate(45deg);
            border-top: 1px solid #2ecc71;
            border-bottom: 1px solid #2ecc71;
            letter-spacing: 1px;
        }

        /* Geometric Graphic background for hero right side */
        .geo-bg {
            background-image: radial-gradient(circle at 50% 50%, rgba(46, 204, 113, 0.1) 0%, transparent 60%);
        }
    </style>
</head>
<body class="antialiased font-sans flex flex-col min-h-screen">

    <!-- Top Navigation Bar (Flat, dark green) -->

        <div class="flex items-center gap-3 text-xl font-bold text-white tracking-wider">
            <span>AS-Creations</span>
        </div>
        <div class="hidden md:flex space-x-6 text-sm font-medium text-gray-300">
            <a href="#portfolio" class="px-4 py-1.5 border border-borderGreen rounded-full text-white bg-card transition-all">ASSETS</a>
            <!-- <a href="#about" class="px-4 py-1.5 border border-transparent hover:border-borderGreen rounded-full transition-all">ABOUT</a> -->
            <a href="mailto:asmenkhkara.business@gmail.com" class="px-4 py-1.5 border border-transparent hover:border-borderGreen rounded-full transition-all">CONTACT</a>
        </div>
    </nav>

    <!-- Hero Section -->
    <header class="pt-20 pb-16 px-8 max-w-7xl mx-auto w-full grid grid-cols-1 md:grid-cols-2 gap-12 items-center">
        <!-- Left text area -->

            <h1 class="text-5xl font-bold text-white mb-4 tracking-tight">

            <h2 class="text-xl text-gray-300 mb-6 font-medium">

            <div class="flex gap-4">

                    Projects

            </div>
        </div>
        
        <!-- Right decorative graphic area -->
        <div class="clean-card h-64 relative overflow-hidden geo-bg flex justify-center items-center">
            <!-- Simulated constellation / wireframe connecting dots -->
            <svg width="100%" height="100%" class="absolute opacity-60">
                <line x1="20%" y1="50%" x2="40%" y2="80%" stroke="#2ecc71" stroke-width="1" />
                <line x1="40%" y1="80%" x2="70%" y2="90%" stroke="#2ecc71" stroke-width="1" />
                <line x1="70%" y1="90%" x2="80%" y2="40%" stroke="#2ecc71" stroke-width="1" />
                <line x1="80%" y1="40%" x2="60%" y2="20%" stroke="#2ecc71" stroke-width="1" />
                <line x1="60%" y1="20%" x2="20%" y2="50%" stroke="#2ecc71" stroke-width="1" />
                <line x1="80%" y1="40%" x2="90%" y2="10%" stroke="#2ecc71" stroke-width="1" />

                <circle cx="40%" cy="80%" r="3" fill="none" stroke="#2ecc71" stroke-width="1" />
                <circle cx="70%" cy="90%" r="3" fill="none" stroke="#2ecc71" stroke-width="1" />
                <circle cx="80%" cy="40%" r="5" fill="#2ecc71" />
                <circle cx="60%" cy="20%" r="3" fill="none" stroke="#2ecc71" stroke-width="1" />

    <!-- Filter Section -->

            <button onclick="filterSelection('audio')" class="filter-btn bg-card text-gray-300 px-6 py-2 rounded-full text-sm font-semibold transition-all border border-borderGreen hover:border-accent">

                    <a href="https://assetstore.unity.com/packages/slug/390350" class="block text-center w-full clean-button text-gray-300 py-2.5 rounded text-sm font-medium">
                        View on Asset Store
                    </a>
                </div>
            </div>

            <!-- Card 2: Placeholder -->
            <div class="asset-card models clean-card overflow-hidden flex flex-col col-span-1">
                <div class="clean-card relative overflow-hidden flex flex-col h-full min-h-[180px] group">

                    <svg width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" class="absolute inset-0 opacity-40 group-hover:opacity-60 transition-opacity duration-500">
                        <defs>

                            </pattern>
                            <pattern id="waves" x="0" y="0" width="30" height="20" patternUnits="userSpaceOnUse">
                                <path d="M0 10 Q 7.5 0, 15 10 T 30 10" fill="none" stroke="#2ecc71" stroke-width="0.75" opacity="0.5"></path>
                                <path d="M0 15 Q 7.5 5, 15 15 T 30 15" fill="none" stroke="#2ecc71" stroke-width="0.75" opacity="0.5"></path>
                            </pattern>
                        </defs>

                        <g stroke="#2ecc71" stroke-width="1.5" fill="none">

                        <rect width="100%" height="100%" fill="url(#glow)" style="mix-blend-mode: overlay;" />
                        <defs>
                            <radialGradient id="glow" cx="50%" cy="50%" r="50%">

                                <stop offset="100%" stop-color="transparent" stop-opacity="0" />
                            </radialGradient>

                    </svg>
                </div>
            </div>

            <!-- Column 3: Stacked Cards -->
            <div class="col-span-1 flex flex-col gap-6">
                
                <!-- Stacked Top:  -->
                <div class="asset-card models clean-card col-span-1 min-h-[320px] flex items-center justify-center opacity-70 transition-opacity hover:opacity-100">
                    <h3 class="text-2xl font-bold text-accent tracking-widest uppercase">
                        More Coming Soon

                </div>

                <!-- Decorative card -->
                <div class="clean-card relative overflow-hidden flex flex-col h-full min-h-[180px] group">

                    <svg width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" class="absolute inset-0 opacity-40 group-hover:opacity-60 transition-opacity duration-500">
                        <defs>
                            <pattern id="dots" x="0" y="0" width="16" height="16" patternUnits="userSpaceOnUse">
                                <circle fill="#2ecc71" cx="2" cy="2" r="1.2"></circle>
                            </pattern>
                            <pattern id="waves" x="0" y="0" width="30" height="20" patternUnits="userSpaceOnUse">
                                <path d="M0 10 Q 7.5 0, 15 10 T 30 10" fill="none" stroke="#2ecc71" stroke-width="0.75" opacity="0.5"></path>
                                <path d="M0 15 Q 7.5 5, 15 15 T 30 15" fill="none" stroke="#2ecc71" stroke-width="0.75" opacity="0.5"></path>
                            </pattern>
                        </defs>

                            <rect x="-10%" y="-20%" width="50%" height="70%" rx="40" fill="url(#waves)" stroke-opacity="0.6"/>

                            <rect x="55%" y="40%" width="60%" height="80%" rx="50" fill="url(#dots)" stroke-opacity="0.6"/>

                            <circle cx="45%" cy="30%" r="15%" stroke-opacity="0.8" />
                            <circle cx="75%" cy="15%" r="8%" fill="url(#dots)" stroke-opacity="0.4" />
                            <circle cx="20%" cy="80%" r="12%" fill="url(#waves)" stroke-opacity="0.8" />

                        </g>

                        <defs>
                            <radialGradient id="glow" cx="50%" cy="50%" r="50%">

                                <stop offset="100%" stop-color="transparent" stop-opacity="0" />

    <!-- Footer -->

        </div>
        <p class="text-[11px] text-gray-500">Copyright &copy; 2026 AS-Creations. All rights reserved.</p>
    </footer>

    <!-- Filtering Logic -->
    <script>
        function filterSelection(category) {
            const items = document.getElementsByClassName('asset-card');
            const buttons = document.getElementsByClassName('filter-btn');
            
            // UI Update for buttons
            for (let i = 0; i < buttons.length; i++) {
                // Reset to default inactive style
                buttons[i].classList.remove('bg-borderGreen', 'text-white');
                buttons[i].classList.add('bg-card', 'text-gray-300');
                
                // Remove the green dot if it exists
                const dot = buttons[i].querySelector('span');
                if(dot) dot.remove();

                // Set active style
                if (buttons[i].getAttribute('onclick').includes(category)) {
                    buttons[i].classList.remove('bg-card', 'text-gray-300');
                    buttons[i].classList.add('bg-borderGreen', 'text-white');
                    // Inject green dot indicator
                    buttons[i].insertAdjacentHTML('afterbegin', '<span class="w-2 h-2 rounded-full bg-accent mr-2"></span>');
                }
            }

            // Show/hide grid items based on class
            for (let i = 0; i < items.length; i++) {
                if (category === 'all') {
                    items[i].style.display = 'flex';
                } else {
                    if (items[i].classList.contains(category)) {
                        items[i].style.display = 'flex';
                    } else {
                        items[i].style.display = 'none';
                    }
                }
            }
        }
    </script>
</body>
</html>
